name: pricing-snapshot

on:
  schedule:
    - cron: '15 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: node scripts/validate-sources.mjs

  snapshot:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: node scripts/update-pricing.mjs
      - run: node scripts/generate-index.mjs
      - run: node scripts/generate-readme.mjs
      - run: node scripts/generate-vendor-pages.mjs
      - run: node scripts/generate-changelog.mjs
      - run: node scripts/generate-daily-summary.mjs
      - run: node scripts/generate-today-diff.mjs
      - name: Commit changes
        run: |
          if [ -n "$(git status --porcelain data docs README.md CHANGELOG.md DAILY_SUMMARY.md TODAY_DIFF.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data docs README.md CHANGELOG.md DAILY_SUMMARY.md TODAY_DIFF.md
            git commit -m "chore: refresh intel outputs"
            git push
          else
            echo "No changes"
          fi
